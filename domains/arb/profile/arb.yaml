id: arb
language: python
code_root: ../arb-robot
prompts_dir: domains/arb/profile/prompts
tools: [read_file, write_file, run_tests, linter]
toolchain:
  setup: pip install -e ".[dev]"
  test_command: python -m pytest -q --junitxml=reports/junit.xml
  test_parser: junit_xml
  test_artifacts: ["reports/junit.xml"]
  lint_command: python -m ruff check . && python -m ruff format --check .
  test_dir_glob: "tests/**"
context_schema:
  type: object
  properties:
    language:
      const: python
    domain:
      const: defi_arbitrage
auto_generate_tests: false
validation:
  prd:
    enabled: true
    block_on: error
    require_hitl: true
  design:
    enabled: true
    block_on: error
    require_hitl: true
    validate_mermaid: true
    require_hitl_if_flags: [touches_production, prod_deploy_trading]
hitl:
  sensitive_globs:
    - "core/risk.py"
    - "core/executor.py"
    - "**/deploy/**"
  flags: [touches_production, prod_deploy_trading, risk_limit_changes]
