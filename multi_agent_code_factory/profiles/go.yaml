id: go
extends: _base/common
language: go
code_root: ../generated/go
prompts_dir: multi_agent_code_factory/profiles/go/prompts
toolchain:
  setup: go mod tidy
  test_command: go test -json ./...
  test_parser: go_json
  lint_command: golangci-lint run ./...
  test_dir_glob: "**/*_test.go"
coverage:
  enabled: false
  block_on: false
  command: go test -coverprofile=coverage.out ./...
  parser: go_cover
  artifacts:
    - coverage.out
hitl:
  sensitive_globs: ["**/deploy/**"]
