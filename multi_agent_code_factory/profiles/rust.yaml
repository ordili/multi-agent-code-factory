id: rust
extends: _base/common
language: rust
code_root: ../generated/rust
prompts_dir: multi_agent_code_factory/profiles/rust/prompts
toolchain:
  setup: cargo fetch
  build: cargo build
  test_command: cargo test --message-format=json
  test_parser: cargo_json
  lint_command: cargo clippy --all-targets --all-features -- -D warnings
  test_dir_glob: "{src/**,tests/**}/*.rs"
context_schema:
  type: object
  properties:
    language:
      const: rust
    build_tool:
      const: cargo
    edition:
      type: string
      default: "2021"
hitl:
  sensitive_globs:
    - "**/benches/**"
