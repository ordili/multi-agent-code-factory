id: solidity
extends: _base/common
language: solidity
code_root: ../generated/solidity
prompts_dir: multi_agent_code_factory/profiles/solidity/prompts
toolchain:
  setup: forge build --skip test
  test_command: forge test --json
  test_parser: forge_json
  lint_command: forge fmt --check
  test_dir_glob: "{test,src}/**/*.t.sol"
context_schema:
  type: object
  properties:
    language:
      const: solidity
    build_tool:
      enum: [foundry]
    evm_version:
      type: string
      default: cancun
    test_framework:
      enum: [forge-std]
      default: forge-std
coverage:
  enabled: false
  block_on: false
  command: forge coverage --report summary
  parser: forge_coverage
hitl:
  sensitive_globs:
    - "**/script/**"
    - "**/broadcast/**"
    - "**/deploy/**"
  flags: [touches_production, touches_mainnet]
