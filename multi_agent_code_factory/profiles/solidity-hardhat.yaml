id: solidity-hardhat
language: solidity
code_root: ../generated/solidity-hardhat
prompts_dir: multi_agent_code_factory/profiles/solidity-hardhat/prompts
tools: [read_file, write_file, run_tests, linter]
toolchain:
  setup: npm ci
  build: npx hardhat compile
  test_command: npx hardhat test --reporter mocha-junit-reporter --reporter-options mochaFile=reports/junit.xml
  test_parser: junit_xml
  test_artifacts: ["reports/junit.xml"]
  lint_command: npx solhint "contracts/**/*.sol"
  test_dir_glob: "{test,tests}/**/*.{ts,js}"
context_schema:
  type: object
  properties:
    language:
      const: solidity
    build_tool:
      enum: [hardhat]
auto_generate_tests: false
hitl:
  sensitive_globs:
    - "**/scripts/deploy/**"
    - "**/deployments/**"
  flags: [touches_production, touches_mainnet]
