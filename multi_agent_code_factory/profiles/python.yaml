id: python
extends: _base/common
language: python
code_root: ../generated/python
auto_generate_tests: true
tools: [read_file, write_file, run_tests, linter, git_diff]
prompts_dir: multi_agent_code_factory/profiles/python/prompts
toolchain:
  setup: pip install -e ".[dev]"
  test_command: python -m pytest -q --junitxml=reports/junit.xml
  test_parser: junit_xml
  test_artifacts: ["reports/junit.xml"]
  lint_command: python -m ruff check . && python -m ruff format --check .
  test_dir_glob: "tests/**"
coverage:
  enabled: false
  block_on: false
  command: python -m pytest -q --cov=src --cov-report=json:coverage.json
  parser: pytest_cov_json
  artifacts:
    - coverage.json
  thresholds:
    line_percent: 70
hitl:
  sensitive_globs: ["**/auth/**", "**/deploy/**"]
