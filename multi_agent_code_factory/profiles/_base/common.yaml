# Shared profile defaults (not a CLI profile; loaded via extends only).
tools: [read_file, write_file, run_tests, linter]
auto_generate_tests: false
tests_missing:
  enabled: true
  block_on: true
  detector: file_stem
  inline_tests: false
  scope: dev_tasks
  retry_hint: |
    For each listed source path, add tests/test_<module>.py (or <module>_test.py) covering that module.
validation:
  prd:
    enabled: true
    block_on: error
    semantic_block_on: warn
    require_hitl: false
  design:
    enabled: true
    block_on: error
    semantic_block_on: warn
    require_hitl: false
    validate_mermaid: false
    require_hitl_if_flags: [touches_production]
hitl:
  flags: [touches_production]
