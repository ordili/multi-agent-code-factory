id: java-gradle
language: java
code_root: ../generated/java-gradle
prompts_dir: multi_agent_code_factory/profiles/java-gradle/prompts
tools: [read_file, write_file, run_tests, linter]
toolchain:
  setup: ./gradlew classes -x test
  test_command: ./gradlew test --console=plain
  test_parser: junit_xml
  test_artifacts: ["build/test-results/test/TEST-*.xml"]
  lint_command: ./gradlew checkstyleMain
  test_dir_glob: "src/test/**/*Test.java"
context_schema:
  type: object
  properties:
    language:
      const: java
    build_tool:
      enum: [gradle]
    java_version:
      type: string
      default: "21"
auto_generate_tests: false
hitl:
  sensitive_globs:
    - "**/src/main/resources/application-prod.*"
    - "**/deploy/**"
  flags: [touches_production]
